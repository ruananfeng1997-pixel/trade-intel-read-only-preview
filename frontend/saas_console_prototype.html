<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SaaS Console Prototype</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: #f0f2f5; color: #1a1a2e; }
  .app-layout { display: flex; min-height: 100vh; }
  .sidebar { width: 200px; background: #1a1a2e; color: #fff; padding: 20px 0; flex-shrink: 0; }
  .sidebar .app-title { padding: 0 20px 20px; font-size: 16px; font-weight: 700; border-bottom: 1px solid #333; }
  .sidebar .app-title small { display: block; font-size: 10px; font-weight: 400; color: #888; margin-top: 4px; }
  .sidebar nav { padding: 12px 0; }
  .sidebar nav a { display: block; padding: 10px 20px; color: #bbb; text-decoration: none; font-size: 13px; transition: .2s; cursor: pointer; }
  .sidebar nav a:hover { background: #2a2a4e; color: #fff; }
  .sidebar nav a.active { background: #2a2a4e; color: #fff; border-left: 3px solid #3498db; }
  .sidebar .env-label { padding: 20px 20px 0; font-size: 10px; color: #555; }
  .main { flex: 1; display: flex; flex-direction: column; }
  .safety-bar { display: flex; flex-wrap: wrap; gap: 6px; padding: 8px 20px; background: #fff; border-bottom: 1px solid #e0e0e0; font-size: 11px; }
  .safety-tag { display: inline-flex; align-items: center; gap: 4px; padding: 3px 10px; border-radius: 4px; font-weight: 600; }
  .safety-tag.ok { background: #e8f5e9; color: #2e7d32; }
  .safety-tag.info { background: #e3f2fd; color: #1565c0; }
  .content-area { padding: 20px; flex: 1; overflow-y: auto; }
  .page-header { margin-bottom: 20px; }
  .page-header h2 { font-size: 20px; font-weight: 700; }
  .page-header p { font-size: 13px; color: #888; margin-top: 4px; }
  .kpi-row { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 12px; margin-bottom: 20px; }
  .kpi-card { background: #fff; border-radius: 8px; padding: 14px 16px; box-shadow: 0 1px 3px rgba(0,0,0,.06); }
  .kpi-card .kpi-num { font-size: 24px; font-weight: 700; color: #1a1a2e; }
  .kpi-card .kpi-label { font-size: 11px; color: #888; margin-top: 2px; }
  .kpi-card .kpi-status { font-size: 12px; font-weight: 600; margin-top: 4px; }
  .kpi-card .kpi-status.pass { color: #2e7d32; }
  .kpi-card .kpi-status.fail { color: #c62828; }
  .kpi-card .kpi-status.warn { color: #e65100; }
  .kpi-card .kpi-status.disabled { color: #bbb; }
  .section-title { font-size: 16px; font-weight: 700; margin: 28px 0 12px; padding-bottom: 6px; border-bottom: 2px solid #ddd; }
  .section-title:first-of-type { margin-top: 0; }
  .card { background: #fff; border-radius: 8px; padding: 16px 20px; margin-bottom: 12px; box-shadow: 0 1px 3px rgba(0,0,0,.06); font-size: 13px; }
  .card .card-title { font-size: 14px; font-weight: 600; margin-bottom: 10px; color: #1a1a2e; }
  .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  .grid-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 12px; }
  .grid-4 { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 10px; }
  .info-item { display: flex; justify-content: space-between; align-items: center; padding: 4px 0; border-bottom: 1px solid #f5f5f5; }
  .info-item:last-child { border-bottom: none; }
  .info-label { color: #999; font-size: 12px; }
  .info-value { font-weight: 600; font-size: 12px; color: #1a1a2e; }
  .info-value.pass { color: #2e7d32; }
  .info-value.fail { color: #c62828; }
  .info-value.warn { color: #e65100; }
  .info-value.disabled { color: #bbb; }
  .event-item { padding: 10px 0; border-bottom: 1px solid #f5f5f5; }
  .event-item:last-child { border-bottom: none; }
  .event-score { display: inline-block; font-weight: 700; font-size: 13px; padding: 2px 8px; border-radius: 4px; margin-right: 8px; }
  .event-score.high { background: #ffebee; color: #c62828; }
  .event-score.mid { background: #fff3e0; color: #e65100; }
  .event-score.low { background: #e3f2fd; color: #1565c0; }
  .event-title { font-size: 13px; font-weight: 600; margin: 4px 0; }
  .event-meta { font-size: 11px; color: #888; }
  .event-meta span { margin-right: 12px; }
  .event-link { font-size: 11px; color: #3498db; text-decoration: none; }
  .empty-box { text-align: center; color: #999; padding: 24px; font-size: 13px; background: #fff; border-radius: 8px; box-shadow: 0 1px 3px rgba(0,0,0,.06); }
  .empty-box code { background: #f5f5f5; padding: 2px 6px; border-radius: 3px; font-size: 11px; color: #666; }
  .load-box { text-align: center; color: #888; padding: 16px; font-size: 12px; }
  .diff-table { width: 100%; border-collapse: collapse; font-size: 12px; margin-top: 6px; }
  .diff-table th { text-align: left; padding: 5px 8px; border-bottom: 1px solid #eee; color: #999; font-weight: 500; }
  .diff-table td { padding: 5px 8px; border-bottom: 1px solid #f5f5f5; }
  .nav-content { display: none; }
  .nav-content.active { display: block; }
  .sidebar nav a[data-page] { position: relative; }
  .sidebar nav a[data-page].active::after { content: "▸"; position: absolute; right: 16px; color: #3498db; }
  @media (max-width: 768px) { .sidebar { width: 160px; } .grid-2, .grid-3 { grid-template-columns: 1fr; } }
</style>
</head>
<body>
<div class="app-layout">
  <!-- Sidebar -->
  <div class="sidebar">
    <div class="app-title">SaaS Console <small>Local MVP / SaaS Preview</small></div>
    <nav>
      <a data-page="overview" class="active" onclick="switchPage('overview')">Overview</a>
      <a data-page="events" onclick="switchPage('events')">Events</a>
      <a data-page="datasources" onclick="switchPage('datasources')">Data Sources</a>
      <a data-page="draftreview" onclick="switchPage('draftreview')">Draft Review</a>
      <a data-page="health" onclick="switchPage('health')">Health</a>
      <a data-page="rules" onclick="switchPage('rules')">Rules</a>
      <a data-page="notifications" onclick="switchPage('notifications')">Notifications</a>
      <a data-page="pipeline" onclick="switchPage('pipeline')">Pipeline</a>
      <a data-page="watchlists" onclick="switchPage('watchlists')">Watchlists</a>
      <a data-page="settings" onclick="switchPage('settings')">Settings</a>
    </nav>
    <div class="env-label">Environment: Local MVP</div>
  </div>

  <!-- Main -->
  <div class="main">
    <!-- Safety Bar -->
    <div class="safety-bar" id="safetyBar">
      <span class="safety-tag ok">● No Apply</span>
      <span class="safety-tag ok">● Production Disabled</span>
      <span class="safety-tag ok">● WeChat Dry-run</span>
      <span class="safety-tag ok">● Hourly Paused</span>
      <span class="safety-tag ok">● Direct RSS Default-off</span>
      <span class="safety-tag info" id="namingGuardTag">Naming Guard: ...</span>
    </div>

    <!-- Content -->
    <div class="content-area" id="contentArea">
      <div class="load-box" id="loadIndicator">Loading SaaS Console data...</div>
      <div id="pageContainer"></div>
    </div>
  </div>
</div>

<script>
// ── Page switching ────────────────────────────────────────────────
function switchPage(page) {
  document.querySelectorAll('.sidebar nav a').forEach(function(a) { a.classList.remove('active'); });
  document.querySelector('.sidebar nav a[data-page="' + page + '"]').classList.add('active');
  document.querySelectorAll('.nav-content').forEach(function(c) { c.classList.remove('active'); });
  var el = document.getElementById('page-' + page);
  if (el) el.classList.add('active');
}

// ── Helpers ───────────────────────────────────────────────────────
function fetchJSON(path) {
  return fetch(path).then(function(r) { return r.ok ? r.json() : null; }).catch(function() { return null; });
}

function val(v, fallback) { return v !== undefined && v !== null ? v : (fallback || '-'); }

function tag(v, cls) { return '<span class="info-value ' + cls + '">' + v + '</span>'; }
function item(l, v) { return '<div class="info-item"><span class="info-label">' + l + '</span>' + v + '</div>'; }
function safe(v, p, f) { return v !== null && v !== undefined ? (v ? p : f || 'No') : 'unavailable'; }

function wrapSection(title, content) {
  return '<div class="section-title">' + title + '</div>' + content;
}

// ── Load all data ─────────────────────────────────────────────────
var SEC_NP_PATH = '../backend/output/notification_previews/sec_tesla_notification_previews.local.json';
var secNP = null;
var secNPError = null;
var allData = {};

function loadAll() {
  document.getElementById('loadIndicator').style.display = 'block';
  Promise.all([
    fetchJSON('../backend/output/events_latest.json'),
    fetchJSON('../backend/output/events_latest_with_direct_rss.json'),
    fetchJSON('../backend/output/direct_rss_local_config_status_report.json'),
    fetchJSON('../backend/output/local_config_validation_report.json'),
    fetchJSON('../backend/output/local_config_draft_diff_report.json'),
    fetchJSON('../backend/output/local_config_draft_validation_report.json'),
    fetchJSON('../backend/output/wechat_push_dry_run_report.json'),
    fetchJSON('../docs/NAMING_GUARD_REPORT.json'),
    fetchJSON('../backend/output/pipeline_status.json'),
    // Load SEC notification previews — non-blocking, fails gracefully
    fetchJSON(SEC_NP_PATH).then(function(d) {
      if (d) { secNP = d; secNPError = null; }
      else { secNP = null; secNPError = 'fetch returned empty/null'; }
    }).catch(function(e) {
      secNP = null; secNPError = 'Fetch error: ' + e.message;
    }),
  ]).then(function(results) {
    allData = {
      events: results[0],
      eventsDr: results[1],
      drConfig: results[2],
      configVal: results[3],
      diffReport: results[4],
      valReport: results[5],
      wechatDr: results[6],
      namingGuard: results[7],
      pipelineStatus: results[8],
    };
    document.getElementById('loadIndicator').style.display = 'none';
    try { renderAll(); }
    catch (e) {
      var container = document.getElementById('pageContainer');
      if (container) container.innerHTML = '<div class="empty-box" style="color:#c62828;padding:24px;"><strong>UI Render Error</strong><br><pre style="font-size:11px;text-align:left;overflow:auto;margin-top:8px;background:#f5f5f5;padding:8px;border-radius:4px;">' + (e.message || e.toString()) + '</pre></div>';
    }
  });
}

// ── Render ────────────────────────────────────────────────────────
function renderAll() {
  var d = allData;
  var container = document.getElementById('pageContainer');

  // Safety bar: Naming Guard
  var ngStatus = d.namingGuard ? (d.namingGuard.status || d.namingGuard.NAMING_GUARD_STATUS || 'unknown') : 'unknown';
  document.getElementById('namingGuardTag').textContent = 'Naming Guard: ' + ngStatus.toUpperCase();

  var html = '';
  html += renderOverview(d);
  html += renderEvents(d);
  html += renderDataSources(d);
  html += renderDraftReview(d);
  html += renderHealth(d);
  html += renderRules(d);
  html += renderNotifications(d);
  html += renderPipeline(d);
  html += renderWatchlists();
  html += renderDashboard();
  html += renderDBDashboard();
  html += renderSettings(d);
  container.innerHTML = html;
}

// ── Overview ──────────────────────────────────────────────────────
function renderOverview(d) {
  var evts = d.events ? (d.events.events || d.events || []) : [];
  var evtsDr = d.eventsDr ? (d.eventsDr.events || d.eventsDr || []) : [];
  var drCfg = d.drConfig;
  var cfgVal = d.configVal;
  var valRpt = d.valReport;
  var wcDr = d.wechatDr;

  // SEC notification previews KPIs
  var secNPcount = secNP ? (secNP.notification_preview_count || 0) : 0;
  var secHIGH = 0, secMED = 0;
  if (secNP && secNP.previews) {
    secNP.previews.forEach(function(p) {
      if (p.priority === 'HIGH') secHIGH++;
      else if (p.priority === 'MEDIUM') secMED++;
    });
  }
  var kpi = '<div class="kpi-row">';
  kpi += '<div class="kpi-card"><div class="kpi-num">' + evts.length + '</div><div class="kpi-label">Events (main)</div></div>';
  kpi += '<div class="kpi-card"><div class="kpi-num">' + evtsDr.length + '</div><div class="kpi-label">Events (w/ Direct RSS)</div></div>';
  kpi += '<div class="kpi-card"><div class="kpi-num">' + evts.filter(function(e) { return (e.score && e.score.total_score >= 80) || e.score >= 80; }).length + '</div><div class="kpi-label">High Score Events</div></div>';
  kpi += '<div class="kpi-card"><div class="kpi-num">23</div><div class="kpi-label">Pipeline Runs (demo)</div></div>';
  kpi += '<div class="kpi-card"><div class="kpi-num" style="color:' + (secNPcount > 0 ? '#1565c0' : '#bbb') + ';">' + secNPcount + '</div><div class="kpi-label">SEC Notification Previews</div></div>';
  kpi += '<div class="kpi-card"><div class="kpi-num" style="color:#c62828;">' + secHIGH + '</div><div class="kpi-label">SEC HIGH</div></div>';
  kpi += '<div class="kpi-card"><div class="kpi-num" style="color:#e65100;">' + secMED + '</div><div class="kpi-label">SEC MEDIUM</div></div>';
  kpi += '<div class="kpi-card"><div class="kpi-num" style="font-size:14px;color:#2e7d32;">DISABLED</div><div class="kpi-label">SEC Send Status</div></div>';
  kpi += '</div>';

  var statusGrid = '<div class="card"><div class="card-title">System Status</div><div class="grid-4">';
  statusGrid += item('Local Config', tag(safe(d.configVal, 'Validated', 'Not validated'), d.configVal ? 'pass' : 'disabled'));
  statusGrid += item('Direct RSS Config', tag(safe(drCfg, 'OK', 'N/A'), drCfg ? 'pass' : 'disabled'));
  statusGrid += item('Draft Validation', tag(valRpt && valRpt.status === 'pass' ? 'Pass' : 'N/A', 'pass'));
  statusGrid += item('WeChat Dry-run', tag(wcDr ? 'Available' : 'N/A', wcDr ? 'pass' : 'disabled'));
  statusGrid += item('Production', tag('Disabled', 'pass'));
  statusGrid += item('Hourly', tag('Paused', 'pass'));
  statusGrid += item('Main Output', tag('events_latest.json', 'info'));
  statusGrid += item('Direct RSS', tag('Default-off', 'pass'));
  statusGrid += '</div></div>';

  return wrapSection('Overview', kpi + statusGrid);
}

// ── Events ────────────────────────────────────────────────────────
function renderEvents(d) {
  var raw = d.events ? (d.events.events || d.events) : [];
  var list = Array.isArray(raw) ? raw.slice(0, 10) : [];
  if (!list.length) return wrapSection('Events', '<div class="empty-box">No events available — run pipeline first.<br><code>Main Output: events_latest.json</code></div>');

  var h = '<div class="card"><div class="card-title">Event List <span style="font-size:11px;font-weight:400;color:#888;">(top 10 · Main Output: events_latest.json)</span></div>';
  list.forEach(function(e) {
    var sc = e.score ? (e.score.total_score || e.score) : 0;
    var scClass = sc >= 80 ? 'high' : sc >= 60 ? 'mid' : 'low';
    var kw = e.keywords ? (Array.isArray(e.keywords) ? e.keywords.join(', ') : e.keywords) : '';
    var src = e.source || e.source_type || '-';
    var link = e.link || e.url || '#';
    h += '<div class="event-item">';
    h += '<span class="event-score ' + scClass + '">' + sc + '</span>';
    h += '<span style="font-size:11px;color:#888;">' + (e.event_type || '-') + '</span>';
    h += '<div class="event-title">' + (e.title || e.title_zh || '-') + '</div>';
    h += '<div class="event-meta"><span>source: ' + src + '</span><span>priority: ' + (e.priority || '-') + '</span><span>keywords: ' + kw + '</span></div>';
    if (link !== '#') h += '<a class="event-link" href="' + link + '" target="_blank">\u2197 Open link</a>';
    h += '</div>';
  });
  h += '</div>';
  h += '<div class="empty-box" style="font-size:11px;">Data source: events_latest.json · Direct RSS preview available via toggle (not implemented in prototype)</div>';
  return wrapSection('Events', h);
}

// ── Data Sources ──────────────────────────────────────────────────
function renderDataSources(d) {
  var dr = d.drConfig;
  var gnStatus = d.events ? 'enabled' : 'unavailable';
  var drEnabled = dr ? (dr.direct_rss_preview_enabled === true || dr.direct_rss_production_enabled === true ? 'enabled' : 'disabled') : 'unavailable';
  var drProd = dr ? (dr.direct_rss_production_enabled === true ? 'enabled' : 'disabled') : 'unavailable';
  var drPreview = dr ? (dr.direct_rss_preview_enabled === true ? 'preview available' : 'not enabled') : 'unavailable';

  var h = '<div class="card"><div class="card-title">Data Source Status</div><div class="grid-2">';
  h += item('Google News RSS', tag(gnStatus, gnStatus === 'enabled' ? 'pass' : 'disabled'));
  h += item('Direct RSS Preview', tag(drPreview, drPreview === 'preview available' ? 'pass' : 'disabled'));
  h += item('Direct RSS Production', tag(drProd, drProd === 'disabled' ? 'pass' : 'fail'));
  h += item('Main Output', tag('events_latest.json', 'info'));
  h += item('Direct RSS Default-off', tag('Yes', 'pass'));
  h += item('events_latest remains main', tag('Yes', 'pass'));
  h += '</div></div>';

  return wrapSection('Data Sources', h);
}

// ── Draft Review ──────────────────────────────────────────────────
function renderDraftReview(d) {
  var diff = d.diffReport;
  var valReport = d.valReport;

  if (!diff && !valReport) {
    return wrapSection('Draft Review', '<div class="card"><div class="card-title">Draft Review <span style="font-size:11px;font-weight:400;color:#888;">&middot; No Apply Action Available</span></div><div class="empty-box">No draft data available — run <code>local_config_low_risk_draft_generator.py</code> first.</div></div>');
  }

  var h = '<div class="card"><div class="card-title">Draft Review <span style="font-size:11px;font-weight:400;color:#888;">&middot; No Apply Action Available</span></div>';

  // Changed Fields
  if (diff && diff.changed_fields && diff.changed_fields.length > 0) {
    h += '<div style="font-size:12px;font-weight:600;color:#555;margin:8px 0 4px;">Changed Fields</div>';
    h += '<table class="diff-table"><tr><th>Field Path</th><th>Old</th><th>New</th><th>Risk</th><th>Blocked</th></tr>';
    diff.changed_fields.forEach(function(f) {
      h += '<tr><td>' + (f.field_path || '-') + '</td><td>' + val(f.old_value) + '</td><td>' + val(f.new_value) + '</td><td>' + (f.risk_level || '-') + '</td><td>' + (f.blocked ? 'yes' : 'no') + '</td></tr>';
    });
    h += '</table>';
  } else {
    h += '<div class="info-item"><span class="info-label">Changed Fields</span><span class="info-value disabled">None</span></div>';
  }

  // Validation
  if (valReport) {
    h += '<div style="font-size:12px;font-weight:600;color:#555;margin:12px 0 4px;">Validation</div><div class="grid-3">';
    h += item('Status', tag(valReport.status === 'pass' ? 'Pass' : 'Fail', valReport.status === 'pass' ? 'pass' : 'fail'));
    h += item('Allowed Changes', tag(valReport.allowed_field_changes ? valReport.allowed_field_changes.length : 0, 'pass'));
    h += item('Blocked Changes', tag(valReport.blocked_field_changes ? valReport.blocked_field_changes.length : 0, 'pass'));
    h += item('Sensitive Violations', tag(valReport.sensitive_field_violations ? valReport.sensitive_field_violations.length : 0, 'pass'));
    h += item('Forbidden Changes', tag(valReport.forbidden_field_changes ? valReport.forbidden_field_changes.length : 0, 'pass'));
    h += item('Requires Confirm', tag(valReport.requires_confirm_changes ? valReport.requires_confirm_changes.length : 0, 'pass'));
    h += '</div>';

    h += '<div style="font-size:12px;font-weight:600;color:#555;margin:12px 0 4px;">Safety</div><div class="grid-3">';
    h += item('Production Disabled', tag(valReport.production_still_disabled ? 'Yes' : 'No', valReport.production_still_disabled ? 'pass' : 'fail'));
    h += item('Config Unchanged', tag(valReport.official_config_hashes_unchanged ? 'Yes' : 'No', valReport.official_config_hashes_unchanged ? 'pass' : 'fail'));
    h += item('Events Unchanged', tag(valReport.events_latest_unchanged ? 'Yes' : 'No', valReport.events_latest_unchanged ? 'pass' : 'fail'));
    h += '</div>';
  }

  h += '<div style="margin-top:10px;padding:8px 12px;background:#f5f5f5;border-radius:4px;font-size:11px;color:#888;text-align:center;">No Apply Action Available &middot; Review Only</div>';
  h += '</div>';
  return wrapSection('Draft Review', h);
}

// ── Health ─────────────────────────────────────────────────────────
function renderHealth(d) {
  var ng = d.namingGuard;
  var ngStatus = ng ? (ng.status || ng.NAMING_GUARD_STATUS || 'unknown') : 'unknown';
  var cfgValOk = d.configVal ? 'pass' : 'disabled';
  var drCfgOk = d.drConfig ? 'pass' : 'disabled';
  var valOk = d.valReport && d.valReport.status === 'pass' ? 'pass' : 'disabled';
  var fc = d.valReport ? (d.valReport.failed_checks || []) : [];
  var wn = d.valReport ? (d.valReport.warnings || []) : [];

  var h = '<div class="card"><div class="card-title">Health Status</div><div class="grid-3">';
  h += item('Local Config Validation', tag(cfgValOk === 'pass' ? 'Pass' : 'N/A', cfgValOk));
  h += item('Direct RSS Config', tag(drCfgOk === 'pass' ? 'OK' : 'N/A', drCfgOk));
  h += item('Draft Validation', tag(valOk === 'pass' ? 'Pass' : 'N/A', valOk));
  h += item('Naming Guard', tag(ngStatus.toUpperCase(), ngStatus === 'pass' ? 'pass' : 'warn'));
  h += item('Failed Checks', tag(fc.length, fc.length > 0 ? 'fail' : 'pass'));
  h += item('Warnings', tag(wn.length, wn.length > 0 ? 'warn' : 'pass'));
  h += '</div>';

  if (fc.length > 0) { h += '<div style="margin-top:8px;font-size:12px;color:#c62828;">';
    fc.forEach(function(c) { h += '<div>\u26a0 ' + c + '</div>'; }); h += '</div>'; }
  if (wn.length > 0) { h += '<div style="margin-top:8px;font-size:12px;color:#e65100;">';
    wn.forEach(function(w) { h += '<div>\u26a0 ' + w + '</div>'; }); h += '</div>'; }

  h += '</div>';
  return wrapSection('Health', h);
}

// ── Rules (P1 placeholder) ────────────────────────────────────────
function renderRules(d) {
  var h = '<div class="card"><div class="card-title">Rules <span style="font-size:11px;font-weight:400;color:#888;">&middot; Read-only placeholder</span></div>';
  h += '<div class="empty-box">Rules page coming in next phase. Current rules are read-only in Local Config Overview.</div>';
  h += '</div>';
  return wrapSection('Rules', h);
}

// ── Notifications (P1) ────────────────────────────────────────────
function renderNotifications(d) {
  var wc = d.wechatDr;
  var h = '<div class="card"><div class="card-title">Notifications <span style="font-size:11px;font-weight:400;color:#888;">&middot; Dry-run only</span></div>';
  h += '<div class="grid-2">';
  h += item('WeChat Push Enabled', tag(wc ? (wc.enabled || wc.push_enabled ? 'true' : 'false') : 'N/A', wc ? 'pass' : 'disabled'));

// ── Watchlists (P1 API-backed read-only) ───────────────────────────
var WATCHLIST_API_BASE = 'http://127.0.0.1:8765';
var WATCHLIST_DEFAULT_ID = 'tsla_watchlist_draft_v1';

function fetchWatchlistAPI(path) {
  return fetch(WATCHLIST_API_BASE + path).then(function(r) { return r.ok ? r.json() : null; }).catch(function() { return null; });
}

var watchlistApiStatus = null;
var watchlistDetail = null;
var watchlistDraftReview = null;
var watchlistSafety = null;
var watchlistDataLoaded = false;

function loadWatchlistData() {
  if (watchlistDataLoaded) return;
  watchlistDataLoaded = true;
  fetchWatchlistAPI('/api/watchlists').then(function(wlData) {
    if (!wlData || wlData.status !== 'ok') {
      watchlistApiStatus = 'unavailable';
      reRenderWatchlists();
      return;
    }
    watchlistApiStatus = 'ok';
    var wid = WATCHLIST_DEFAULT_ID;
    if (wlData.data && wlData.data.watchlists && wlData.data.watchlists.length > 0) {
      wid = wlData.data.watchlists[0].watchlist_id || wid;
    }
    // Fetch detail, draft-review, safety in parallel
    Promise.all([
      fetchWatchlistAPI('/api/watchlists/' + wid),
      fetchWatchlistAPI('/api/watchlists/' + wid + '/draft-review'),
      fetchWatchlistAPI('/api/watchlists/' + wid + '/safety'),
    ]).then(function(results) {
      watchlistDetail = results[0];
      watchlistDraftReview = results[1];
      watchlistSafety = results[2];
      reRenderWatchlists();
    });
  });
}

function reRenderWatchlists() {
  var el = document.getElementById('page-watchlists');
  if (!el) return;
  var newHtml = renderWatchlists();
  // Extract just the inner content of page-watchlists from the fresh render,
  // then replace the existing element's content to avoid nested page-watchlists divs
  var tempDiv = document.createElement('div');
  tempDiv.innerHTML = newHtml;
  var newContent = tempDiv.querySelector('#page-watchlists');
  if (newContent) {
    el.innerHTML = newContent.innerHTML;
  }
}

function renderDashboard() {

      var s = JSON.parse(xhr.responseText);
      var h = '<div class="card"><div class="card-title" style="font-size:16px;color:#1565c0;">📊 Project Status Dashboard</div>';

      h += '<strong>Task:</strong> ' + (s.scheduler ? s.scheduler.task_name : 'N/A') + ' | ';
      h += '<strong>Health:</strong> <span style="color:#2e7d32;">' + (s.scheduler ? s.scheduler.health_status : 'N/A') + '</span> | ';

      h += '<div class="kpi-card"><div class="kpi-num" style="font-size:14px;color:#2e7d32;">' + (s.local_alert ? s.local_alert.alert_level : 'N/A') + '</div><div class="kpi-label">Alert Level</div></div>';
      h += '<div class="kpi-card"><div class="kpi-num" style="font-size:14px;color:#2e7d32;">' + (s.review_queue ? s.review_queue.candidate_count : 'N/A') + '</div><div class="kpi-label">Candidates</div></div>';

      h += '<div class="kpi-card"><div class="kpi-num" style="font-size:14px;color:#888;">' + (s.multi_watchlist && s.multi_watchlist.disabled_watchlists ? s.multi_watchlist.disabled_watchlists.join(', ') : 'N/A') + '</div><div class="kpi-label">Disabled</div></div>';
      h += '<div class="kpi-card"><div class="kpi-num" style="font-size:14px;color:#888;">' + (s.review_queue ? s.review_queue.api_mode : 'N/A') + '</div><div class="kpi-label">API Mode</div></div>';
      h += '<div class="kpi-card"><div class="kpi-num" style="font-size:14px;color:#888;">' + (s.safety ? 'NOT_RUN' : 'N/A') + '</div><div class="kpi-label">Real Send</div></div>';
      h += '</div>';

      h += '<span><strong>webhook_call:</strong> <span style="color:#2e7d32;">' + (sf.webhook_call || 'NOT_RUN') + '</span></span>';
      h += '<span><strong>history_mod:</strong> <span style="color:#2e7d32;">' + (sf.delivered_history_modified === false ? 'false' : 'true') + '</span></span>';
      h += '<span><strong>production:</strong> <span style="color:#2e7d32;">' + (sf.production || 'DISABLED') + '</span></span>';
      h += '<span><strong>retry:</strong> <span style="color:#2e7d32;">' + (sf.retry || 'DISABLED') + '</span></span>';
      h += '<span><strong>auto_send:</strong> <span style="color:#2e7d32;">' + (sf.auto_send_enabled === false ? 'DISABLED' : 'ENABLED') + '</span></span>';

  return wrapSection('System Status', h);
